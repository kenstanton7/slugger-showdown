<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Big Fly: Slugger Showdown</title>
    <style>
        :root { 
            --off-white: #fdfaf0; 
            --vintage-cream: #f4ecd8;
            --success-green: #28a745;
            --clean-font: 'Segoe UI', Roboto, Arial, sans-serif;
            --fire-orange: #ff4500;
            --fire-glow: rgba(255, 69, 0, 0.8);

            /* DEFAULT: HOME RUN MODE (MLB) */
            --primary-bg: #1a1a1a;
            --header-bg: #041E42; 
            --accent-color: #BF0D3E; 
            --text-gold: #c5a059;
            --card-border: #ddd;
            
            /* Sharp Black Shadow globally applied for perfect readability */
            --title-color: #ffffff;
            --title-shadow: #000000;
            --vs-color: #ffffff;
            --vs-shadow: #000000;
        }

        /* HITS MODE THEME (BALLPARK GREEN) */
        body.mode-hits {
            --primary-bg: #122615; 
            --header-bg: #004831; 
            --accent-color: #fdb927; 
            --text-gold: #ffffff;
            --card-border: #b5ac91;
        }

        body { 
            font-family: var(--clean-font); background-color: var(--primary-bg);
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px; color: #333; margin: 0; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh;
            transition: background-color 0.5s ease;
        }

        header { 
            background: var(--header-bg); width: 100%; text-align: center; padding: 12px 0; 
            border-bottom: 6px solid var(--accent-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: white; position: relative; transition: background 0.5s, border-bottom 0.5s;
        }
        
        h1 { 
            font-family: 'Impact', sans-serif; font-size: 2.8rem; margin: 0; text-transform: uppercase;
            letter-spacing: 2px; color: var(--title-color); text-shadow: 2px 2px 0px var(--title-shadow);
            transition: color 0.5s, text-shadow 0.5s;
        }

        .mode-select {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            background: var(--vintage-cream); color: var(--header-bg); border: 2px solid var(--text-gold); 
            padding: 5px; font-weight: 800; border-radius: 4px; cursor: pointer; font-family: var(--clean-font); 
            font-size: 0.75rem; transition: color 0.5s, border 0.5s;
        }

        .help-btn {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            background: var(--text-gold); color: var(--header-bg); border: none; padding: 6px 12px; 
            border-radius: 4px; font-weight: 900; cursor: pointer; font-size: 0.7rem;
            transition: background 0.5s, color 0.5s;
        }

        /* NEW: Mute Button Styling */
        .mute-btn {
            position: absolute; right: 85px; top: 50%; transform: translateY(-50%);
            background: var(--text-gold); color: var(--header-bg); border: none; padding: 6px 10px; 
            border-radius: 4px; font-weight: 900; cursor: pointer; font-size: 0.7rem;
            transition: background 0.5s, color 0.5s;
        }

        .stats-bar {
            display: flex; justify-content: center; gap: 30px; margin: 10px 0; background: var(--vintage-cream); 
            padding: 10px 30px; border-radius: 5px; border: 3px solid var(--header-bg); 
            box-shadow: 4px 4px 0px var(--accent-color); transition: border 0.5s, box-shadow 0.5s;
        }
        .stat-box { font-weight: 900; font-size: 1.1rem; color: var(--header-bg); transition: color 0.5s; display: flex; align-items: center;}

        /* FIRE INDICATOR CSS */
        #fire-indicator { display: none; color: var(--fire-orange) !important; font-style: italic; }
        
        .stats-bar.on-fire {
            animation: fire-glow 2s infinite alternate; border-color: var(--fire-orange) !important;
            box-shadow: 0 0 20px var(--fire-glow), 4px 4px 0px var(--fire-orange) !important;
        }
        .stats-bar.on-fire #fire-indicator { display: block; }
        .on-fire .stat-box { color: var(--fire-orange) !important; }

        @keyframes fire-glow {
            0% { box-shadow: 0 0 10px var(--fire-glow), 4px 4px 0px var(--fire-orange); }
            100% { box-shadow: 0 0 30px var(--fire-glow), 4px 4px 0px #ff0000; }
        }

        .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 10px; }

        .baseball-card {
            width: 320px; background: var(--off-white); padding: 12px; border: 2px solid var(--card-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); cursor: pointer; transition: 0.3s; position: relative; border-radius: 8px;
        }
        .baseball-card::before {
            content: ''; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 2px solid var(--header-bg); pointer-events: none; border-radius: 4px; z-index: 2; transition: border 0.5s;
        }
        
        .player-img-wrapper { 
            background: #fff; border: 1px solid #ccc; padding: 4px; margin-bottom: 8px; 
            position: relative; overflow: hidden; height: 380px; display: flex; align-items: center; justify-content: center;
        }
        
        .headshot { 
            width: 100%; height: 100%; object-fit: cover; object-position: top center; 
            display: block; filter: contrast(1.05); transition: 0.3s; 
        }

        .initials-fallback {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, var(--header-bg) 0%, #000 150%);
            color: var(--off-white); font-family: 'Impact', sans-serif; font-size: 8rem;
            letter-spacing: 2px; text-shadow: 4px 4px 0px var(--accent-color);
            transition: background 0.5s, text-shadow 0.5s;
        }
        
        .result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; z-index: 5; pointer-events: none; }

        .player-name { font-family: 'Impact', sans-serif; font-size: 1.8rem; color: var(--header-bg); margin: 8px 0; line-height: 1.1; min-height: 4rem; text-align: center; display: flex; align-items: center; justify-content: center; text-transform: uppercase; transition: color 0.5s;}

        .hr-container { text-align: center; height: 90px; display: flex; flex-direction: column; justify-content: center; background: rgba(0,0,0,0.03); border-radius: 10px; margin-top: 5px; }
        .label-text { font-size: 0.7rem; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 1px; visibility: hidden; margin-bottom: -5px; }
        .hr-reveal { font-family: 'Impact', sans-serif; font-size: 4rem; color: var(--accent-color); visibility: hidden; text-shadow: 2px 2px 0px #fff; transition: color 0.5s;}

        .correct { border: 12px solid var(--success-green) !important; box-shadow: 0 0 40px rgba(40, 167, 69, 0.7) !important; animation: pulse-correct 0.6s ease; }
        .correct .result-overlay { background: rgba(40, 167, 69, 0.3); opacity: 1; }

        .wrong { border: 12px solid var(--accent-color) !important; box-shadow: 0 0 40px rgba(191, 13, 62, 0.7) !important; animation: shake-wrong 0.5s cubic-bezier(.36,.07,.19,.97) both; transition: border 0.5s; }
        .wrong .result-overlay { background: rgba(191, 13, 62, 0.4); opacity: 1; }

        @keyframes pulse-correct { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        @keyframes shake-wrong { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--vintage-cream); padding: 30px; max-width: 450px; border: 4px solid var(--header-bg); box-shadow: 10px 10px 0px var(--accent-color); text-align: center; transition: border 0.5s, box-shadow 0.5s; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .close-modal { background: var(--accent-color); color: white; font-size: 1.3rem; width: 100%; margin-bottom: 12px; transition: background 0.5s; }

        .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 100%; }
        .btn-social { color: white; font-size: 0.8rem; padding: 10px; }

        @media (max-width: 600px) { 
            h1 { font-size: 1.8rem; } 
            .mode-select { position: relative; left: 0; transform: none; margin-bottom: 5px; top: 0; }
            .help-btn { right: 10px; padding: 6px 8px; }
            .mute-btn { right: 70px; padding: 6px 8px; }
        }
    </style>
</head>
<body>

<header>
    <select id="game-mode" class="mode-select" onchange="handleModeSwitch()">
        <option value="homeRuns">Home Run Mode</option>
        <option value="hits">Hits Mode</option>
    </select>
    <h1 id="main-title">THE BIG FLY</h1>
    <div id="sub-title" style="font-weight: bold; color: var(--text-gold); letter-spacing: 2px; font-size: 0.8rem; transition: color 0.5s;">SLUGGER SHOWDOWN</div>
    <button id="mute-btn" class="mute-btn" onclick="toggleMute()">🔊 Sound</button>
    <button class="help-btn" onclick="toggleInstructions(true)">Rules</button>
</header>

<div class="stats-bar" id="status-bar">
    <div class="stat-box">SCORE: <span id="score">0</span></div>
    <div class="stat-box" style="color:var(--accent-color); transition: color 0.5s;">OUTS: <span id="strikes">⚪⚪⚪</span></div>
    <div class="stat-box">BEST: <span id="high-score">0</span></div>
    <div class="stat-box" id="fire-indicator">🔥 YOU'RE ON FIRE!</div>
</div>

<div class="card-container">
    <div class="baseball-card" id="card-left" onclick="makeGuess('left')">
        <div class="player-img-wrapper">
            <div class="result-overlay"></div>
            <img id="img-left" class="headshot" src="">
        </div>
        <div class="player-name" id="name-left">SELECTING...</div>
        <div class="hr-container"><div class="label-text">Career Home Runs</div><div class="hr-reveal" id="hr-left">0</div></div>
    </div>
    <div style="align-self: center; font-family: 'Impact'; font-size: 2.5rem; color: var(--vs-color); text-shadow: 2px 2px var(--vs-shadow); transition: color 0.5s, text-shadow 0.5s;">VS</div>
    <div class="baseball-card" id="card-right" onclick="makeGuess('right')">
        <div class="player-img-wrapper">
            <div class="result-overlay"></div>
            <img id="img-right" class="headshot" src="">
        </div>
        <div class="player-name" id="name-right">SELECTING...</div>
        <div class="hr-container"><div class="label-text">Career Home Runs</div><div class="hr-reveal" id="hr-right">0</div></div>
    </div>
</div>

<div id="instructions-modal" class="modal" style="display:flex;">
    <div class="modal-content">
        <h2 style="font-family: 'Impact'; color: var(--header-bg); font-size: 2rem; margin-top:0;">RULES</h2>
        <p id="rule-text" style="font-size: 1.1rem; line-height: 1.5; font-weight: 500;">Loading rules...</p>
        <p style="color: var(--accent-color); font-weight: 800; font-size: 1.2rem; margin-top: 20px;">3 STRIKES AND YOU'RE OUT!</p>
        <button class="btn close-modal" onclick="toggleInstructions(false)">PLAY BALL</button>
    </div>
</div>

<div id="game-over-modal" class="modal">
    <div class="modal-content">
        <h1 style="color:var(--header-bg); margin-bottom: 0;">YOU'RE OUT!</h1>
        <h2 id="final-score-display" style="color:var(--accent-color); margin-top: 0;">Score: 0</h2>
        <button class="btn close-modal" onclick="resetGame()">PLAY AGAIN</button>
        
        <div class="share-grid">
            <button class="btn btn-social" style="background:#555" onclick="share('copy')">📋 Copy Text</button>
            <button class="btn btn-social" style="background:#25D366" onclick="share('wa')">WhatsApp</button>
            <button class="btn btn-social" style="background:#000000" onclick="share('x')">X (Twitter)</button>
            <button class="btn btn-social" style="background:#E1306C" onclick="share('ig')">Instagram</button>
        </div>
    </div>
</div>

<script src="player_pool.js"></script>
<script>
    let leftData, rightData, score = 0, strikes = 0, currentStreak = 0, busy = false;
    
    // NEW: Mute tracking variable
    let isMuted = false;

    // AUDIO SETUP
    const sfxCrack = new Audio('crack.mp3');
    const sfxPop = new Audio('pop.mp3');
    const sfxRoar = new Audio('roar.mp3');
    
    sfxCrack.volume = 0.6;
    sfxPop.volume = 0.5;
    sfxRoar.volume = 0.4;

    // NEW: Function to toggle sound on/off
    function toggleMute() {
        isMuted = !isMuted;
        const muteBtn = document.getElementById('mute-btn');
        if (isMuted) {
            muteBtn.innerText = "🔇 Muted";
            muteBtn.style.opacity = "0.7";
        } else {
            muteBtn.innerText = "🔊 Sound";
            muteBtn.style.opacity = "1";
        }
    }

    function getHighScoreKey() { return `big_fly_high_${document.getElementById('game-mode').value}`; }

    function updateHighScoreDisplay() {
        let hs = localStorage.getItem(getHighScoreKey()) || 0;
        document.getElementById('high-score').innerText = hs;
    }

    function checkPools() {
        if (typeof homeRunPool === 'undefined' || typeof hitsPool === 'undefined') {
            console.error("Pools not found!"); return false;
        }
        return true;
    }

    async function getStats(id) {
        const mode = document.getElementById('game-mode').value;
        const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${id}/stats?stats=career&group=hitting`);
        const j = await r.json();
        return j.stats[0]?.splits[0]?.stat[mode] || 0;
    }

    function updateTheme() {
        const mode = document.getElementById('game-mode').value;
        const body = document.body;
        const ruleText = document.getElementById('rule-text');
        
        if (mode === 'hits') {
            body.classList.add('mode-hits');
            document.getElementById('main-title').innerText = "THE HIT KING";
            document.getElementById('sub-title').innerText = "CONTACT SHOWDOWN";
            document.title = "The Hit King: Contact Showdown";
            ruleText.innerHTML = "Out of the two players shown, pick the one with the <strong>most career hits</strong>.<br><br>This mode features players who were active between 2000-2025 and accumulated <strong>at least 300 hits</strong>.<br><br><span style='color: var(--accent-color); font-weight: 900; font-size: 1.1em;'>IMPORTANT:</span> The numbers reflect their <strong>entire lifetime career</strong>, including any seasons they played in the 1980s or 1990s!";
        } else {
            body.classList.remove('mode-hits');
            document.getElementById('main-title').innerText = "THE BIG FLY";
            document.getElementById('sub-title').innerText = "SLUGGER SHOWDOWN";
            document.title = "The Big Fly: Slugger Showdown";
            ruleText.innerHTML = "Out of the two players shown, pick the one with the <strong>most career home runs</strong>.<br><br>This mode features players who were active between 2000-2025 and launched <strong>at least 50 home runs</strong>.<br><br><span style='color: var(--accent-color); font-weight: 900; font-size: 1.1em;'>IMPORTANT:</span> The numbers reflect their <strong>entire lifetime career</strong>, including any seasons they played in the 1980s or 1990s!";
        }
        updateHighScoreDisplay();
    }

    function resetImageStyle(imgElement) {
        imgElement.style.display = 'block';
        imgElement.style.objectFit = 'cover';
        
        let wrapper = imgElement.parentElement;
        let fallbackDiv = wrapper.querySelector('.initials-fallback');
        if (fallbackDiv) wrapper.removeChild(fallbackDiv);
    }

    function setFallbackImage(imgElement, fullName) {
        imgElement.style.display = 'none'; 
        
        let wrapper = imgElement.parentElement;
        let fallbackDiv = wrapper.querySelector('.initials-fallback');
        
        if (!fallbackDiv) {
            fallbackDiv = document.createElement('div');
            fallbackDiv.className = 'initials-fallback';
            wrapper.appendChild(fallbackDiv);
        }
        
        let parts = fullName.split(' ');
        let initials = parts[0][0];
        if (parts.length > 1) initials += parts[parts.length - 1][0];
        
        fallbackDiv.innerText = initials.toUpperCase();
    }

    async function fetchWikiImage(name, imgElement) {
        try {
            const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(name)}|${encodeURIComponent(name + " (baseball)")}&prop=pageimages&format=json&pithumbsize=500&origin=*`;
            const response = await fetch(url);
            const data = await response.json();
            const pages = data.query.pages;
            
            let foundImg = null;
            for (let id in pages) {
                if (id !== "-1" && pages[id].thumbnail) {
                    foundImg = pages[id].thumbnail.source;
                    break;
                }
            }
            
            if (foundImg) {
                imgElement.src = foundImg;
                imgElement.onerror = () => setFallbackImage(imgElement, name);
            } else {
                setFallbackImage(imgElement, name); 
            }
        } catch (e) {
            setFallbackImage(imgElement, name);
        }
    }

    async function loadPlayerImage(imgElement, id, name) {
        const modernUrl = `https://img.mlbstatic.com/mlb-photos/image/upload/w_426,q_auto:best/v1/people/${id}/headshot/67/current?v=${new Date().getTime()}`;

        try {
            const response = await fetch(modernUrl);
            
            if (!response.ok) {
                fetchWikiImage(name, imgElement);
                return;
            }

            const blob = await response.blob();
            
            if (blob.size < 12000) {
                fetchWikiImage(name, imgElement); 
            } else {
                const objectURL = URL.createObjectURL(blob);
                imgElement.src = objectURL;
                imgElement.onload = () => URL.revokeObjectURL(objectURL);
                imgElement.onerror = () => fetchWikiImage(name, imgElement); 
            }
        } catch(e) {
            fetchWikiImage(name, imgElement);
        }
    }

    async function nextRound() {
        if (!checkPools()) return;
        busy = true;
        const mode = document.getElementById('game-mode').value;
        const pool = (mode === 'homeRuns') ? homeRunPool : hitsPool;
        const labelText = (mode === 'homeRuns') ? 'Career Home Runs' : 'Career Hits';
        
        document.querySelectorAll('.label-text').forEach(el => { el.innerText = labelText; el.style.visibility = 'hidden'; });
        document.querySelectorAll('.hr-reveal').forEach(el => el.style.visibility = 'hidden');
        document.querySelectorAll('.baseball-card').forEach(el => el.className = 'baseball-card');

        const p1 = pool[Math.floor(Math.random() * pool.length)];
        let p2 = pool[Math.floor(Math.random() * pool.length)];
        while(p1.id === p2.id) p2 = pool[Math.floor(Math.random() * pool.length)];

        let stat1 = await getStats(p1.id);
        let stat2 = await getStats(p2.id);

        while(stat1 === stat2) {
            p2 = pool[Math.floor(Math.random() * pool.length)];
            if(p1.id !== p2.id) stat2 = await getStats(p2.id);
        }

        document.getElementById('name-left').innerText = p1.name;
        document.getElementById('name-right').innerText = p2.name;
        
        const imgLeft = document.getElementById('img-left');
        const imgRight = document.getElementById('img-right');
        
        resetImageStyle(imgLeft);
        resetImageStyle(imgRight);
        
        loadPlayerImage(imgLeft, p1.id, p1.name);
        loadPlayerImage(imgRight, p2.id, p2.name);

        leftData = { ...p1, val: stat1 };
        rightData = { ...p2, val: stat2 };
        busy = false;
    }

    function makeGuess(side) {
        if(busy) return;
        busy = true;
        const isCorrect = (side === 'left' && leftData.val > rightData.val) || (side === 'right' && rightData.val > leftData.val);
        document.getElementById('hr-left').innerText = leftData.val;
        document.getElementById('hr-right').innerText = rightData.val;
        document.querySelectorAll('.hr-reveal, .label-text').forEach(el => el.style.visibility = 'visible');

        const statusBar = document.getElementById('status-bar');

        if(isCorrect) {
            score++;
            currentStreak++; 
            document.getElementById('score').innerText = score;
            document.getElementById(`card-${side}`).classList.add('correct');
            
            // CHECK IF MUTED BEFORE PLAYING!
            if (!isMuted) {
                sfxCrack.currentTime = 0;
                sfxCrack.play().catch(e => console.log("Audio play prevented"));
            }
            
            if (currentStreak >= 5) { 
                statusBar.classList.add('on-fire'); 
                if (currentStreak === 5 && !isMuted) {
                    sfxRoar.currentTime = 0;
                    sfxRoar.play().catch(e => console.log("Audio play prevented"));
                }
            }
        } else {
            strikes++;
            currentStreak = 0; 
            document.getElementById('strikes').innerText = "❌".repeat(strikes) + "⚪".repeat(3-strikes);
            document.getElementById(`card-${side}`).classList.add('wrong');
            statusBar.classList.remove('on-fire'); 

            // CHECK IF MUTED BEFORE PLAYING!
            if (!isMuted) {
                sfxPop.currentTime = 0;
                sfxPop.play().catch(e => console.log("Audio play prevented"));
            }
        }

        setTimeout(() => {
            if(strikes >= 3) {
                let hsKey = getHighScoreKey();
                let currentHS = localStorage.getItem(hsKey) || 0;
                if(score > currentHS) {
                    localStorage.setItem(hsKey, score);
                    updateHighScoreDisplay();
                }

                statusBar.classList.remove('on-fire');
                document.getElementById('final-score-display').innerText = "SCORE: " + score;
                document.getElementById('game-over-modal').style.display = 'flex';
            } else { nextRound(); }
        }, 1800);
    }

    function share(platform) {
        const modeName = document.getElementById('game-mode').value === 'homeRuns' ? 'Home Runs' : 'Hits';
        const text = `⚾ I hit a score of ${score} on ${modeName} mode in 'The Big Fly'! Can you beat my high score? Play here: ${window.location.href}`;
        
        if (platform === 'copy' || platform === 'ig') {
            navigator.clipboard.writeText(text);
            if (platform === 'ig') alert("Score text copied! Open Instagram to paste it into your Story or Post.");
            else alert("Score copied to clipboard!");
        } else if (platform === 'wa') {
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        } else if (platform === 'x') {
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`);
        }
    }

    function handleModeSwitch() {
        resetGame();
        toggleInstructions(true); 
    }

    function resetGame() {
        score = 0; strikes = 0; currentStreak = 0; 
        document.getElementById('score').innerText = "0";
        document.getElementById('strikes').innerText = "⚪⚪⚪";
        document.getElementById('game-over-modal').style.display = 'none';
        document.getElementById('status-bar').classList.remove('on-fire'); 
        updateTheme(); 
        nextRound();
    }

    function toggleInstructions(show) { document.getElementById('instructions-modal').style.display = show ? 'flex' : 'none'; }

    updateTheme(); 
    nextRound();
</script>
</body>
</html>
